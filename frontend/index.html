<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disaster Relief Coordinator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero-bar">
      <div>
        <p class="eyebrow">DS2 Course Project</p>
        <h1>Disaster Relief Coordinator</h1>
      </div>
      <div class="hero-stats">
        <div class="stat-card">
          <span class="stat-label">Cycle</span>
          <strong id="cycleCounter">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">Heap Min</span>
          <strong id="heapMinLabel">-</strong>
        </div>
      </div>
    </header>

    <main class="dashboard-grid">
      <section class="panel panel-map">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Live Geography</p>
            <h2>Relief Map</h2>
          </div>
          <span class="panel-badge">Leaflet</span>
        </div>
        <div id="map"></div>
      </section>

      <section class="panel panel-heap">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Priority Queue</p>
            <h2>Fibonacci Heap</h2>
          </div>
          <span class="panel-badge">D3</span>
        </div>
        <div id="heapViz"></div>
      </section>

      <section class="panel panel-tabs">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Supporting Structures</p>
            <h2>Trie, Skip List, Union-Find</h2>
          </div>
        </div>
        <div class="tabs">
          <button class="tab-button is-active" data-tab="trie">Trie</button>
          <button class="tab-button" data-tab="skiplist">Skip List</button>
          <button class="tab-button" data-tab="unionfind">Union-Find</button>
        </div>
        <div class="tab-panels">
          <div class="tab-panel is-active" data-panel="trie">
            <div id="trieViz"></div>
          </div>
          <div class="tab-panel" data-panel="skiplist">
            <div id="skipListViz"></div>
          </div>
          <div class="tab-panel" data-panel="unionfind">
            <div id="unionFindViz"></div>
          </div>
        </div>
      </section>
    </main>

    <section class="panel panel-log">
      <div class="panel-header">
        <div>
          <p class="panel-kicker">Execution Trace</p>
          <h2>Dispatch Log</h2>
        </div>
        <span class="panel-badge">Auto-refresh 2s</span>
      </div>
      <div id="dispatchLog" class="dispatch-log"></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="js/map.js"></script>
  <script src="js/heapViz.js"></script>
  <script src="js/trieViz.js"></script>
  <script src="js/skipListViz.js"></script>
  <script src="js/unionFindViz.js"></script>
  <script>
    const tabButtons = Array.from(document.querySelectorAll('.tab-button'));
    const tabPanels = Array.from(document.querySelectorAll('.tab-panel'));

    tabButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const target = button.dataset.tab;
        tabButtons.forEach((item) => item.classList.toggle('is-active', item === button));
        tabPanels.forEach((panel) => {
          panel.classList.toggle('is-active', panel.dataset.panel === target);
        });
      });
    });

    async function loadState() {
      try {
        const response = await fetch(`data/state.json?ts=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const state = await response.json();
        document.getElementById('cycleCounter').textContent = state.cycle ?? 0;
        document.getElementById('heapMinLabel').textContent = state.heap?.min_id ?? '-';
        renderMapState(state);
        renderHeap(state.heap || { nodes: [], min_id: -1 });
        renderTriePath(state.trie_path || []);
        renderSkipList(state.skip_list || { levels: [] });
        renderUnionFind(state.union_find || { components: [] }, state.zones || []);
        renderDispatchLog(state.dispatch_log || [], state.zones || [], state.depots || []);
      } catch (error) {
        console.error('Failed to load state.json', error);
      }
    }

    loadState();
    setInterval(loadState, 2000);
  </script>
</body>
</html>
